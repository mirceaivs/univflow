<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UnivFlow - Asistent Academic AI</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            primary: {
              50: '#eff6ff',
              100: '#dbeafe',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; transition: background-color 0.2s, color 0.2s; }
    .dark body { background-color: #020617; color: #f8fafc; }
    
    
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #334155; }

    
    @keyframes pageTransition {
      from {
        opacity: 0;
        transform: translateY(8px) scale(0.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    .page-transition {
      animation: pageTransition 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .dropdown-enter {
      animation: slideDown 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    
    @keyframes bubbleAppearUser {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(12px);
        transform-origin: bottom right;
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
    @keyframes bubbleAppearAI {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(12px);
        transform-origin: bottom left;
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
    .message-user-anim {
      animation: bubbleAppearUser 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .message-ai-anim {
      animation: bubbleAppearAI 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    
    @keyframes cursorBlink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    .is-streaming p:last-child::after,
    .is-streaming li:last-child::after,
    .is-streaming pre:last-child code::after {
      content: "▊";
      display: inline-block;
      width: 8px;
      height: 15px;
      margin-left: 4px;
      animation: cursorBlink 0.8s infinite;
      color: #2563eb;
      vertical-align: middle;
    }
    .dark .is-streaming p:last-child::after,
    .dark .is-streaming li:last-child::after,
    .dark .is-streaming pre:last-child code::after {
      color: #60a5fa;
    }

    
    @keyframes typingBounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-4px); opacity: 1; }
    }
    .typing-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background-color: #2563eb;
      border-radius: 50%;
      animation: typingBounce 1.2s infinite ease-in-out;
    }
    .dark .typing-dot {
      background-color: #60a5fa;
    }
    .typing-dot:nth-child(1) { animation-delay: 0s; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    
    @keyframes modalFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes modalScaleUp {
      from { opacity: 0; transform: scale(0.96) translateY(12px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-overlay-anim {
      animation: modalFadeIn 0.2s ease-out forwards;
    }
    .modal-content-anim {
      animation: modalScaleUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
  </style>
  </head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.jsx"></script>
</html>
